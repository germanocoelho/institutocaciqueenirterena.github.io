<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Documentação OREKA INPI — ICET</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a1a;font-family:Inter,sans-serif;color:#f0f0f0;display:flex;flex-direction:column;height:100vh}
header{background:#0A0603;border-bottom:1px solid rgba(242,196,90,.3);padding:.8rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;flex-shrink:0}
h1{font-size:.9rem;color:#F2C45A}
.sub{font-size:.72rem;color:rgba(247,242,232,.5);margin-top:.2rem}
.btns{display:flex;gap:.6rem;flex-wrap:wrap}
.btn{padding:.45rem 1rem;font-size:.72rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;border:1px solid rgba(242,196,90,.4);color:#F2C45A;background:rgba(139,58,15,.2);transition:.2s}
.btn:hover{background:rgba(139,58,15,.5)}
#viewer{flex:1;width:100%;border:none}
#loading{display:flex;align-items:center;justify-content:center;flex:1;flex-direction:column;gap:1rem;color:rgba(247,242,232,.6);font-size:.9rem}
</style>
</head>
<body>
<header>
  <div>
    <h1>Pedido de Registro de Marca Coletiva OREKA · INPI · Processo 941549186</h1>
    <div class="sub">Instituto Cacique Enir Terena · 12/10/2025 · 36 páginas</div>
  </div>
  <div class="btns">
    <a href="https://raw.githubusercontent.com/germanocoelho/institutocaciqueenirterena.github.io/main/docs/oreka_inpi.pdf" download="oreka_inpi.pdf" class="btn">⬇ Baixar PDF</a>
    <a href="/" class="btn">← Voltar</a>
  </div>
</header>
<div id="loading">
  <div style="width:40px;height:40px;border:3px solid rgba(242,196,90,.2);border-top-color:#F2C45A;border-radius:50%;animation:spin 1s linear infinite"></div>
  <span>Carregando documento...</span>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<script>
// Usar fetch para baixar o PDF como ArrayBuffer e criar um Blob URL
// com Content-Type correto — resolve o problema do octet-stream
fetch('https://raw.githubusercontent.com/germanocoelho/institutocaciqueenirterena.github.io/main/docs/oreka_inpi.pdf')
  .then(function(r){return r.arrayBuffer();})
  .then(function(buf){
    var blob = new Blob([buf], {type:'application/pdf'});
    var url  = URL.createObjectURL(blob);
    document.getElementById('loading').style.display='none';
    var iframe = document.createElement('iframe');
    iframe.id='viewer';
    iframe.src=url;
    iframe.style.cssText='flex:1;width:100%;border:none';
    document.body.appendChild(iframe);
  })
  .catch(function(){
    document.getElementById('loading').innerHTML='<p style="color:#f87171">Não foi possível carregar o PDF no browser.</p><a href="https://raw.githubusercontent.com/germanocoelho/institutocaciqueenirterena.github.io/main/docs/oreka_inpi.pdf" download style="color:#F2C45A;margin-top:.5rem">Clique aqui para baixar o arquivo</a>';
  });
</script>
</body>
</html>
